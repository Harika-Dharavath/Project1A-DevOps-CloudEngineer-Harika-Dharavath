name: Production CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: rooply23/novapay-app
  IMAGE_TAG: ${{ github.sha }}

jobs:

# 1️⃣ Source + Build + Unit Test
  build:
    runs-on: ubuntu-latest
    outputs:
      image: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          java-version: '21'

      - name: Build & Unit Test
        run: mvn clean verify

# 2️⃣ SAST (SonarQube with Quality Gate)
  sast:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v4

      - name: Sonar Scan
        run: |
          mvn sonar:sonar \
          -Dsonar.projectKey=my-project \
          -Dsonar.host.url=${{ secrets.SONAR_HOST_URL }} \
          -Dsonar.login=${{ secrets.SONAR_TOKEN }}

# 3️⃣ Build & Push Docker Image
  docker:
    runs-on: ubuntu-latest
    needs: sast

    steps:
      - uses: actions/checkout@v4

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Build Image
        run: docker build -t $IMAGE_NAME:$IMAGE_TAG .

      - name: Push Image
        run: docker push $IMAGE_NAME:$IMAGE_TAG

# 4️⃣ Container Security Scan (Fail on High/Critical)
  security-scan:
    runs-on: ubuntu-latest
    needs: docker

    steps:
      - name: Scan Image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          severity: CRITICAL,HIGH
          exit-code: 1   # ❗ Fail pipeline if vulnerabilities found

# 5️⃣ Integration Tests (Service Level)
  integration-test:
    runs-on: ubuntu-latest
    needs: security-scan

    steps:
      - name: Run Integration Tests
        run: mvn verify -Pintegration

# 6️⃣ DAST (Placeholder for ZAP / API scan)
  dast:
    runs-on: ubuntu-latest
    needs: integration-test

    steps:
      - name: Run DAST Scan
        run: echo "Trigger OWASP ZAP or API security tests here"

# 7️⃣ Deploy to Kubernetes (Rolling / Canary Ready)
  deploy:
    runs-on: ubuntu-latest
    needs: dast

    steps:
      - name: Set Kubeconfig
        run: echo "${{ secrets.KUBE_CONFIG }}" > kubeconfig

      - name: Deploy using kubectl
        run: |
          kubectl --kubeconfig=kubeconfig set image deployment/my-app \
          my-app=$IMAGE_NAME:$IMAGE_TAG

      - name: Wait for rollout
        run: |
          kubectl --kubeconfig=kubeconfig rollout status deployment/my-app --timeout=120s

# 8️⃣ Post-Deployment Verification + Rollback
  verify:
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Health Check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://your-app-url/health)
          if [ "$STATUS" != "200" ]; then
            echo "Health check failed. Rolling back..."
            kubectl rollout undo deployment/my-app
            exit 1
          fi

      - name: Success
        run: echo "Deployment successful ✅"